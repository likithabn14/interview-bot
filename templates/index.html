<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLSI AI Simulator</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            text-align: center;
            color: #58a6ff;
            font-size: 20px;
            font-weight: bold;
        }
        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }
        .user-msg {
            background-color: #238636;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai-msg {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #58a6ff;
        }
        button {
            padding: 12px 24px;
            background-color: #58a6ff;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #79c0ff;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            🧠 Offline RAG Simulator: VLSI Technology
        </div>
        
        <div class="chat-box" id="chat-box">
            <div class="message ai-msg">
                System Online. I have ingested the VLSI JD. What would you like to practice?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="E.g., Ask me a hard technical question based on this JD..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function handleKeyPress(e) {
            if(e.keyCode === 13){
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if(!message) return;

            addMessage(message, 'user-msg');
            inputField.value = '';
            
            // Show typing indicator
            const typingId = addMessage("Thinking...", 'ai-msg');

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // Replace typing indicator with real answer
                const chatBox = document.getElementById('chat-box');
                const typingElement = document.getElementById(typingId);
                typingElement.innerText = data.answer;
                
            } catch (error) {
                document.getElementById(typingId).innerText = "Error connecting to backend.";
            }
        }

        function addMessage(text, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            
            const uniqueId = 'msg-' + Date.now();
            msgDiv.id = uniqueId;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return uniqueId;
        }
    </script>

</body>
</html>
